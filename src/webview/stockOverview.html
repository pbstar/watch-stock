<!-- A股全览片段：样式、HTML、JS 均在此文件，由 stockHome.js 提取注入 -->
<style>
  .overview-wrap {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .overview-title {
    font-size: 13px;
    color: var(--vscode-descriptionForeground, #888);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--vscode-panel-border, #454545);
  }
  .overview-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
  }
  .ov-card {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 10px 12px;
    border: 1px solid var(--vscode-panel-border, #454545);
    border-radius: 3px;
  }
  .ov-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .ov-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ov-code {
    font-size: 11px;
    color: var(--vscode-descriptionForeground, #888);
    flex-shrink: 0;
  }
  .ov-price {
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.3px;
  }
  .ov-chg {
    font-size: 11px;
  }
  .overview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--vscode-panel-border, #454545);
  }
  .overview-header .overview-title {
    border-bottom: none;
    padding-bottom: 0;
  }
</style>
<div class="overview-wrap" id="overview-wrap">
  <div class="overview-header">
    <div class="overview-title">大盘指数</div>
    <button class="btn-refresh" id="refresh-btn">↻ 刷新</button>
  </div>
  <div class="overview-cards" id="index-cards"></div>
</div>

<script>
  /* 渲染大盘指数卡片 */
  function renderIndexCards() {
    const indexCards = $("index-cards");
    if (!indexCards || !indexStocks || !indexStocks.length) return;
    indexCards.innerHTML = indexStocks
      .map((s) => {
        const v = parseFloat(s.changePercent);
        const cls = v > 0 ? "up" : v < 0 ? "dn" : "";
        const sign = v > 0 ? "+" : "";
        return `<div class="ov-card" data-code="${s.code}">
          <div class="ov-card-top">
            <span class="ov-name">${escHtml(s.name)}</span>
            <span class="ov-code">${escHtml(s.code).toUpperCase()}</span>
          </div>
          <span class="ov-price ${cls}">${s.current}</span>
          <span class="ov-chg ${cls}">${sign}${s.changePercent}%&nbsp;${sign}${s.changeValue}</span>
        </div>`;
      })
      .join("");
  }

  /* 渲染全览卡片 */
  function renderOverviewCards() {
    renderIndexCards();
  }

  /* 刷新按钮点击事件 - 绑定到 overviewContainer */
  overviewContainer.addEventListener("click", (e) => {
    if (e.target.closest(".btn-refresh")) {
      vscode.postMessage({ type: "refreshIndex" });
    }
  });
</script>
