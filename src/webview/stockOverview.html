<!-- A股全览片段：样式、HTML、JS 均在此文件，由 stockHome.js 提取注入 -->
<style>
  .overview-wrap {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .overview-title {
    font-size: 13px;
    color: var(--vscode-descriptionForeground, #888);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--vscode-panel-border, #454545);
  }
  .overview-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
  }
  .ov-card {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 10px 12px;
    border: 1px solid var(--vscode-panel-border, #454545);
    border-radius: 3px;
  }
  .ov-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .ov-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ov-code {
    font-size: 11px;
    color: var(--vscode-descriptionForeground, #888);
    flex-shrink: 0;
  }
  .ov-price {
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.3px;
  }
  .ov-chg {
    font-size: 11px;
  }
  .overview-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--vscode-panel-border, #454545);
  }
  .overview-header .overview-title {
    border-bottom: none;
    padding-bottom: 0;
  }
</style>
<div class="overview-wrap" id="overview-wrap">
  <div class="overview-header">
    <div class="overview-title">大盘指数</div>
    <button class="btn-refresh" id="refresh-btn">↻ 刷新</button>
  </div>
  <div class="overview-cards" id="index-cards"></div>

  <div class="overview-header" style="margin-top: 16px">
    <div class="overview-title">行业板块</div>
    <button class="btn-refresh" id="refresh-industry-btn">↻ 刷新</button>
  </div>
  <div class="overview-cards" id="industry-cards"></div>
</div>

<script>
  /**
   * 通用卡片渲染
   * @param {HTMLElement} container - 容器元素
   * @param {Array} list - 数据列表
   * @param {Object} options - 渲染选项
   */
  function renderCards(
    container,
    list,
    { showPrice = true, sorted = false } = {},
  ) {
    if (!container || !list?.length) return;

    const items = sorted
      ? [...list].sort(
          (a, b) => parseFloat(b.changePercent) - parseFloat(a.changePercent),
        )
      : list;

    container.innerHTML = items
      .map((s) => {
        const v = parseFloat(s.changePercent);
        const cls = v > 0 ? "up" : v < 0 ? "dn" : "";
        const sign = v > 0 ? "+" : "";
        const priceHtml = showPrice
          ? `<span class="ov-price ${cls}">${s.current}</span>\n          <span class="ov-chg ${cls}">${sign}${s.changePercent}%&nbsp;${sign}${s.changeValue}</span>`
          : `<span class="ov-chg ${cls}" style="font-size: 14px; font-weight: 600;">${sign}${s.changePercent}%</span>`;
        return `<div class="ov-card" data-code="${s.code}">
          <div class="ov-card-top">
            <span class="ov-name">${escHtml(s.name)}</span>
            <span class="ov-code">${escHtml(s.code).toUpperCase()}</span>
          </div>
          ${priceHtml}
        </div>`;
      })
      .join("");
  }

  function renderOverviewCards() {
    renderCards($("index-cards"), indexStocks, { showPrice: true });
    renderCards($("industry-cards"), industryStocks, {
      showPrice: false,
      sorted: true,
    });
  }

  function showSectionLoading(elementId) {
    const el = $(elementId);
    if (el) {
      el.innerHTML =
        '<div style="padding: 20px; text-align: center; color: var(--vscode-descriptionForeground, #888);">正在获取数据...</div>';
    }
  }

  overviewContainer.addEventListener("click", (e) => {
    if (e.target.closest("#refresh-btn")) {
      showSectionLoading("index-cards");
      vscode.postMessage({ type: "refreshIndex" });
    } else if (e.target.closest("#refresh-industry-btn")) {
      showSectionLoading("industry-cards");
      vscode.postMessage({ type: "refreshIndustry" });
    }
  });
</script>
