<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-{{NONCE}}';"
    />
    <title>股票分时图</title>
    <style>
      :root {
        --c-up: #c94c4c;
        --c-dn: #2d8a2d;
        --c-grid: rgba(128, 128, 128, 0.18);
        --c-bdr: rgba(128, 128, 128, 0.3);
        --c-axis: var(--vscode-descriptionForeground, #888);
        --c-ch: rgba(140, 140, 140, 0.5);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--vscode-editor-background);
        color: var(--vscode-editor-foreground);
        font-family: var(
          --vscode-font-family,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif
        );
        font-size: 13px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: auto;
      }

      .tab-bar {
        display: flex;
        background: var(--vscode-editorGroupHeader-tabsBackground, #252526);
        border-bottom: 1px solid var(--vscode-panel-border, #454545);
        overflow-x: auto;
        scrollbar-width: none;
        flex-shrink: 0;
      }
      .tab-bar::-webkit-scrollbar {
        display: none;
      }

      .tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 16px;
        cursor: pointer;
        border-right: 1px solid var(--vscode-panel-border, #454545);
        white-space: nowrap;
        color: var(--vscode-tab-inactiveForeground, #8c8c8c);
        background: var(--vscode-tab-inactiveBackground, #2d2d2d);
        border-top: 2px solid transparent;
        transition: background 0.15s ease;
        user-select: none;
      }
      .tab:hover {
        background: var(--vscode-tab-hoverBackground, #2a2d2e);
      }
      .tab.active {
        color: var(--vscode-tab-activeForeground, #ccc);
        background: var(--vscode-tab-activeBackground, #1e1e1e);
        border-top-color: var(--vscode-tab-activeBorderTop, #007acc);
      }
      .tab-name {
        font-weight: 500;
        font-size: 13px;
      }
      .tab-chg {
        font-size: 11px;
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 14px 16px 12px;
        overflow: visible;
        gap: 10px;
      }

      .s-header {
        display: flex;
        flex-direction: column;
        gap: 10px;
        flex-shrink: 0;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--vscode-panel-border, #454545);
      }
      .s-header-top {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 36px;
        flex-wrap: wrap;
      }
      .s-name {
        font-size: 15px;
        font-weight: 600;
      }
      .s-code {
        font-size: 12px;
        color: var(--vscode-descriptionForeground, #888);
      }
      .s-price {
        font-size: 26px;
        font-weight: 700;
        margin-left: 4px;
        line-height: 1;
        letter-spacing: -0.3px;
      }
      .s-chg {
        font-size: 13px;
      }
      .s-time {
        font-size: 12px;
        color: var(--vscode-descriptionForeground, #888);
        margin-left: auto;
      }
      .btn-refresh {
        background: none;
        border: 1px solid var(--vscode-panel-border, #454545);
        color: var(--vscode-editor-foreground);
        padding: 3px 9px;
        cursor: pointer;
        border-radius: 2px;
        font-size: 12px;
        transition: background 0.15s ease;
      }
      .btn-refresh:hover {
        background: var(--vscode-list-hoverBackground, #2a2d2e);
      }

      .s-details {
        min-width: 600px;
        max-width: 1000px;
        width: 100%;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 6px 16px;
        font-size: 12px;
      }
      .s-detail-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .s-detail-label {
        color: var(--vscode-descriptionForeground, #888);
        flex-shrink: 0;
      }
      .s-detail-value {
        font-weight: 500;
        text-align: right;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .chart-wrap {
        height: 240px;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
        display: flex;
        justify-content: center;
        width: 100%;
        min-width: 0;
      }
      .chart-wrap svg {
        display: block;
        min-width: 600px;
        max-width: 1000px;
        width: 100%;
      }

      .vol-wrap {
        height: 80px;
        flex-shrink: 0;
        position: relative;
        overflow: hidden;
        display: flex;
        justify-content: center;
        width: 100%;
        min-width: 0;
      }
      .vol-wrap svg {
        display: block;
        min-width: 600px;
        max-width: 1000px;
        width: 100%;
      }

      .placeholder {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--vscode-descriptionForeground, #888);
        font-size: 13px;
      }

      .tooltip {
        position: absolute;
        background: var(--vscode-editorWidget-background, #252526);
        border: 1px solid var(--vscode-editorWidget-border, #454545);
        border-radius: 3px;
        padding: 7px 10px;
        font-size: 12px;
        line-height: 1.7;
        pointer-events: none;
        display: none;
        z-index: 10;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .up {
        color: var(--c-up);
      }
      .dn {
        color: var(--c-dn);
      }
      .gray {
        color: var(--c-axis);
      }
    </style>
  </head>
  <body>
    <div class="tab-bar" id="tab-bar"></div>
    <div class="main">
      <div class="s-header" id="s-header">
        <span class="gray">加载中...</span>
      </div>
      <div class="chart-wrap" id="chart-wrap">
        <div class="placeholder" id="placeholder">正在获取分时数据...</div>
        <svg id="chart-svg"></svg>
        <div class="tooltip" id="tooltip"></div>
      </div>
      <div class="vol-wrap" id="vol-wrap">
        <svg id="vol-svg"></svg>
      </div>
    </div>

    <script nonce="{{NONCE}}">
      const vscode = acquireVsCodeApi();

      /* -------- 状态 -------- */
      let stocks = [];
      let activeCode = null;
      const stocksMap = {};
      const quoteDataMap = {};
      let minuteData = null;
      let activeInfo = null;
      let activeQuote = null;

      /* -------- DOM 缓存 -------- */
      const $ = (id) => document.getElementById(id);
      const tabBar = $("tab-bar");
      const sHeader = $("s-header");
      const chartWrap = $("chart-wrap");
      const chartSvg = $("chart-svg");
      const placeholder = $("placeholder");
      const tooltipEl = $("tooltip");
      const volWrap = $("vol-wrap");
      const volSvg = $("vol-svg");

      /* -------- 颜色常量（与 CSS :root 同步） -------- */
      const C_UP = "#c94c4c";
      const C_DN = "#2d8a2d";
      const C_GRID = "rgba(128,128,128,0.18)";
      const C_BDR = "rgba(128,128,128,0.3)";
      const C_AXIS = "var(--vscode-descriptionForeground,#888)";
      const NS = "http://www.w3.org/2000/svg";

      /* -------- 十字线复用元素（创建一次） -------- */
      let chEls = null;
      function ensureChEls() {
        if (chEls) return chEls;
        const mkLine = (parent) => {
          const l = document.createElementNS(NS, "line");
          l.setAttribute("stroke", "rgba(140,140,140,0.5)");
          l.setAttribute("stroke-width", "1");
          l.setAttribute("stroke-dasharray", "3,3");
          l.classList.add("ch");
          parent.appendChild(l);
          return l;
        };
        const dot = document.createElementNS(NS, "circle");
        dot.setAttribute("r", "4");
        dot.classList.add("ch");
        chartSvg.appendChild(dot);
        chEls = {
          vLine: mkLine(chartSvg),
          hLine: mkLine(chartSvg),
          vvLine: mkLine(volSvg),
          dot,
        };
        return chEls;
      }
      function hideChEls() {
        if (!chEls) return;
        chEls.vLine.style.display = "none";
        chEls.hLine.style.display = "none";
        chEls.vvLine.style.display = "none";
        chEls.dot.style.display = "none";
      }

      /* -------- 格式化工具函数 -------- */
      function fmtNum(n, d = 2) {
        return n == null || isNaN(n) ? "-" : Number(n).toFixed(d);
      }

      function fmtVol(n) {
        if (n == null || isNaN(n)) return "-";
        if (n >= 1e8) return (n / 1e8).toFixed(2) + "亿";
        if (n >= 1e4) return (n / 1e4).toFixed(2) + "万";
        return String(Math.round(n));
      }

      function fmtMoney(n) {
        if (n == null || isNaN(n)) return "-";
        if (n >= 1e12) return (n / 1e12).toFixed(2) + "万亿";
        if (n >= 1e8) return (n / 1e8).toFixed(2) + "亿";
        if (n >= 1e4) return (n / 1e4).toFixed(2) + "万";
        return Number(n).toFixed(2);
      }

      function priceCls(val, base) {
        if (val > base) return "up";
        if (val < base) return "dn";
        return "";
      }

      /* -------- 渲染 Tab（事件委托，只绑定一次） -------- */
      tabBar.addEventListener("click", (e) => {
        const tab = e.target.closest(".tab");
        if (!tab) return;
        const c = tab.dataset.code;
        if (c && c !== activeCode) {
          activeCode = c;
          minuteData = null;
          activeInfo = stocksMap[c] || null;
          activeQuote = quoteDataMap[c] || null;
          renderTabs();
          renderHeader();
          vscode.postMessage({ type: "switchStock", code: c });
        }
      });

      function renderTabs() {
        tabBar.innerHTML = stocks
          .map((s) => {
            const v = parseFloat(s.changePercent);
            const cls = v > 0 ? "up" : v < 0 ? "dn" : "";
            const sign = v > 0 ? "+" : "";
            const active = s.code === activeCode ? " active" : "";
            return `<div class="tab${active}" data-code="${s.code}">
              <span class="tab-name">${escHtml(s.name)}</span>
              <span class="tab-chg ${cls}">${sign}${s.changePercent}%</span>
            </div>`;
          })
          .join("");
      }

      /* -------- 渲染头部信息（事件委托，只绑定一次） -------- */
      sHeader.addEventListener("click", (e) => {
        if (e.target.closest(".btn-refresh")) {
          vscode.postMessage({ type: "refresh" });
        }
      });

      function renderHeader() {
        const s = activeInfo;
        const q = activeQuote;
        if (!s) {
          sHeader.innerHTML = '<span class="gray">加载中...</span>';
          return;
        }
        const v = parseFloat(s.changePercent);
        const cls = v > 0 ? "up" : v < 0 ? "dn" : "";
        const sign = v > 0 ? "+" : "";

        let detailsHtml = "";
        if (q) {
          const close = q.close;
          const items = [
            ["今开", fmtNum(q.open), priceCls(q.open, close)],
            ["最高", fmtNum(q.high), q.high > close ? "up" : ""],
            ["最低", fmtNum(q.low), q.low < close ? "dn" : ""],
            ["昨收", fmtNum(q.close), ""],
            ["成交量", fmtVol(q.volume), ""],
            ["成交额", fmtMoney(q.amount), ""],
            [
              "换手率",
              q.turnoverRatio != null ? fmtNum(q.turnoverRatio) + "%" : "-",
              "",
            ],
            ["量比", q.volumeRatio != null ? fmtNum(q.volumeRatio) : "-", ""],
            ["市盈率(TTM)", q.pe != null ? fmtNum(q.pe) : "-", ""],
            ["市净率", q.pb != null ? fmtNum(q.pb) : "-", ""],
            ["总市值", fmtMoney(q.totalMarket), ""],
            ["流通市值", fmtMoney(q.circulationMarket), ""],
          ];
          detailsHtml =
            `<div class="s-details">` +
            items
              .map(
                ([label, val, c]) =>
                  `<div class="s-detail-item"><span class="s-detail-label">${label}</span><span class="s-detail-value ${c}">${val}</span></div>`,
              )
              .join("") +
            `</div>`;
        }

        sHeader.innerHTML = `
        <div class="s-header-top">
          <span class="s-name">${escHtml(s.name)}</span>
          <span class="s-code">${escHtml(s.code).toUpperCase()}</span>
          <span class="s-price ${cls}">${s.current}</span>
          <span class="s-chg ${cls}">${sign}${s.changePercent}%&nbsp;${sign}${s.changeValue}</span>
          <span class="s-time">${s.dateTime || ""}</span>
          <button class="btn-refresh">↻ 刷新</button>
        </div>
        ${detailsHtml}
      `;
      }

      /* -------- HTML 转义防 XSS -------- */
      function escHtml(s) {
        const d = document.createElement("span");
        d.textContent = s;
        return d.innerHTML;
      }

      /* -------- 加载中状态 -------- */
      function showLoading() {
        minuteData = null;
        chartSvg.innerHTML = "";
        volSvg.innerHTML = "";
        placeholder.style.display = "flex";
        placeholder.textContent = "正在获取分时数据...";
        hideChEls();
      }

      /* -------- 渲染分时图 -------- */
      function renderChart() {
        if (!minuteData?.length) {
          placeholder.style.display = "flex";
          placeholder.textContent = minuteData
            ? "暂无分时数据"
            : "正在获取分时数据...";
          chartSvg.innerHTML = "";
          volSvg.innerHTML = "";
          hideChEls();
          return;
        }
        placeholder.style.display = "none";

        const W = Math.min(1000, Math.max(600, chartWrap.clientWidth));
        const H = chartWrap.clientHeight;
        if (W < 10 || H < 10) return;

        const info = activeInfo;
        const dec = info?.isETF ? 3 : 2;
        const preClose =
          info?.preClose != null
            ? parseFloat(info.preClose)
            : parseFloat(info?.current || 0) -
                parseFloat(info?.changeValue || 0) ||
              minuteData[0]?.price ||
              0;

        const prices = minuteData.map((d) => d.price);
        const lastPrice = prices[prices.length - 1];
        const isUp = lastPrice >= preClose;
        const lc = isUp ? C_UP : C_DN;

        const maxDev =
          Math.max(
            ...prices.map((p) => Math.abs(p - preClose)),
            preClose * 0.005,
          ) * 1.15;
        const yMin = preClose - maxDev;
        const yMax = preClose + maxDev;

        const PAD = { t: 12, r: 58, b: 26, l: 62 };
        const cW = W - PAD.l - PAD.r;
        const cH = H - PAD.t - PAD.b;
        const n = minuteData.length;

        const xOf = (i) => PAD.l + (i / Math.max(n - 1, 1)) * cW;
        const yOf = (p) => PAD.t + ((yMax - p) / (yMax - yMin)) * cH;
        const pcY = yOf(preClose);

        const pts = minuteData.map(
          (d, i) => `${xOf(i).toFixed(1)},${yOf(d.price).toFixed(1)}`,
        );
        const lp = "M " + pts.join(" L ");
        const lx = xOf(n - 1).toFixed(1);
        const x0 = xOf(0).toFixed(1);
        const bY = (PAD.t + cH).toFixed(1);
        const fp = `${lp} L ${lx},${bY} L ${x0},${bY} Z`;

        const yTicks = Array.from({ length: 5 }, (_, i) => {
          const p = yMin + ((yMax - yMin) * i) / 4;
          const pct = ((p - preClose) / preClose) * 100;
          return {
            y: yOf(p),
            price: p.toFixed(dec),
            pct: (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%",
            color: pct > 0.01 ? C_UP : pct < -0.01 ? C_DN : C_AXIS,
          };
        });

        const tMarks = [
          "09:30",
          "10:00",
          "10:30",
          "11:00",
          "11:30",
          "13:00",
          "13:30",
          "14:00",
          "14:30",
          "15:00",
        ];
        let ti = 0;
        const xTicks = tMarks
          .map((t) => {
            while (ti < n && minuteData[ti].time.slice(-5) < t) ti++;
            return ti < n ? { label: t, x: xOf(ti) } : null;
          })
          .filter(Boolean);

        chartSvg.setAttribute("width", W);
        chartSvg.setAttribute("height", H);

        const gridLines = yTicks
          .map(
            (tk) =>
              `<line x1="${PAD.l}" y1="${tk.y.toFixed(1)}" x2="${PAD.l + cW}" y2="${tk.y.toFixed(1)}" stroke="${C_GRID}" stroke-width="1"/>`,
          )
          .join("");

        const yLeftLabels = yTicks
          .map(
            (tk) =>
              `<text x="${PAD.l - 5}" y="${(tk.y + 4).toFixed(1)}" text-anchor="end" font-size="11" fill="${C_AXIS}">${tk.price}</text>`,
          )
          .join("");

        const yRightLabels = yTicks
          .map(
            (tk) =>
              `<text x="${PAD.l + cW + 5}" y="${(tk.y + 4).toFixed(1)}" text-anchor="start" font-size="11" fill="${tk.color}">${tk.pct}</text>`,
          )
          .join("");

        const xTimeLabels = xTicks
          .map(
            (tk) =>
              `<text x="${tk.x.toFixed(1)}" y="${(PAD.t + cH + 17).toFixed(1)}" text-anchor="middle" font-size="11" fill="${C_AXIS}">${tk.label}</text>`,
          )
          .join("");

        chartSvg.innerHTML = `
        <defs>
          <clipPath id="cc"><rect x="${PAD.l}" y="${PAD.t}" width="${cW}" height="${cH}"/></clipPath>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${lc}" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="${lc}" stop-opacity="0.02"/>
          </linearGradient>
        </defs>
        ${gridLines}
        <line x1="${PAD.l}" y1="${pcY.toFixed(1)}" x2="${PAD.l + cW}" y2="${pcY.toFixed(1)}"
          stroke="${C_AXIS}" stroke-opacity="0.5" stroke-dasharray="4,3" stroke-width="1"/>
        <path d="${fp}" fill="url(#areaGrad)" clip-path="url(#cc)"/>
        <path d="${lp}" fill="none" stroke="${lc}" stroke-width="1.3" clip-path="url(#cc)"/>
        <circle cx="${xOf(n - 1).toFixed(1)}" cy="${yOf(lastPrice).toFixed(1)}" r="3" fill="${lc}"/>
        ${yLeftLabels}
        ${yRightLabels}
        ${xTimeLabels}
        <rect x="${PAD.l}" y="${PAD.t}" width="${cW}" height="${cH}" fill="none" stroke="${C_BDR}" stroke-width="1"/>
        <rect id="hit" x="${PAD.l}" y="${PAD.t}" width="${cW}" height="${cH}" fill="transparent" style="cursor:crosshair"/>
      `;

        renderVolume(PAD, cW, n, xOf);
        chEls = null;
        setupCrosshair(PAD, cW, cH, n, xOf, yOf, preClose, dec, lc);
      }

      /* -------- 渲染成交量柱状图 -------- */
      function renderVolume(PAD, cW, n, xOf) {
        const W = Math.min(1000, Math.max(600, volWrap.clientWidth));
        const H = volWrap.clientHeight;
        if (W < 10 || H < 10) return;

        const vols = new Array(n);
        for (let i = 0; i < n; i++) {
          vols[i] =
            i === 0
              ? minuteData[i].volume
              : Math.max(0, minuteData[i].volume - minuteData[i - 1].volume);
        }
        const maxVol = Math.max(...vols, 1);
        const vt = 4,
          vb = 16;
        const vH = H - vt - vb;
        const barW = Math.max(1, (cW / n) * 0.75);

        let bars = "";
        for (let i = 0; i < n; i++) {
          const bH = Math.max(1, (vols[i] / maxVol) * vH);
          const x = (xOf(i) - barW / 2).toFixed(1);
          const y = (vt + vH - bH).toFixed(1);
          const prevPrice =
            i > 0 ? minuteData[i - 1].price : minuteData[i].price;
          const c = minuteData[i].price >= prevPrice ? C_UP : C_DN;
          bars += `<rect x="${x}" y="${y}" width="${barW.toFixed(1)}" height="${bH.toFixed(1)}" fill="${c}" fill-opacity="0.65"/>`;
        }

        volSvg.setAttribute("width", W);
        volSvg.setAttribute("height", H);
        volSvg.innerHTML = `
        <defs><clipPath id="vcc"><rect x="${PAD.l}" y="${vt}" width="${cW}" height="${vH}"/></clipPath></defs>
        <g clip-path="url(#vcc)">${bars}</g>
        <text x="${PAD.l - 5}" y="${vt + 9}" text-anchor="end" font-size="10" fill="${C_AXIS}">${fmtVol(maxVol)}</text>
        <rect x="${PAD.l}" y="${vt}" width="${cW}" height="${vH}" fill="none" stroke="${C_BDR}" stroke-width="1"/>
        <rect id="vol-hit" x="${PAD.l}" y="${vt}" width="${cW}" height="${vH}" fill="transparent" style="cursor:crosshair"/>
      `;
      }

      /* -------- 鼠标十字线（复用 DOM 元素） -------- */
      function setupCrosshair(PAD, cW, cH, n, xOf, yOf, preClose, dec, lc) {
        const hit = document.getElementById("hit");
        if (!hit) return;

        const els = ensureChEls();

        hit.addEventListener("mousemove", onMove);
        hit.addEventListener("mouseleave", onLeave);

        function onMove(e) {
          const sr = chartSvg.getBoundingClientRect();
          const mx = e.clientX - sr.left;
          const idx = Math.round(((mx - PAD.l) / cW) * (n - 1));
          const ci = Math.max(0, Math.min(n - 1, idx));
          const d = minuteData[ci];
          if (!d) return;

          const px = xOf(ci);
          const py = yOf(d.price);
          const pxS = px.toFixed(1);
          const pyS = py.toFixed(1);

          els.vLine.setAttribute("x1", pxS);
          els.vLine.setAttribute("y1", PAD.t);
          els.vLine.setAttribute("x2", pxS);
          els.vLine.setAttribute("y2", PAD.t + cH);
          els.vLine.style.display = "";

          els.hLine.setAttribute("x1", PAD.l);
          els.hLine.setAttribute("y1", pyS);
          els.hLine.setAttribute("x2", PAD.l + cW);
          els.hLine.setAttribute("y2", pyS);
          els.hLine.style.display = "";

          els.vvLine.setAttribute("x1", pxS);
          els.vvLine.setAttribute("y1", 0);
          els.vvLine.setAttribute("x2", pxS);
          els.vvLine.setAttribute("y2", volSvg.getAttribute("height") || "72");
          els.vvLine.style.display = "";

          els.dot.setAttribute("cx", pxS);
          els.dot.setAttribute("cy", pyS);
          els.dot.setAttribute("fill", "var(--vscode-editor-background)");
          els.dot.setAttribute("stroke", lc);
          els.dot.setAttribute("stroke-width", "2");
          els.dot.style.display = "";

          const pct = ((d.price - preClose) / preClose) * 100;
          const chg = d.price - preClose;
          const sign = pct >= 0 ? "+" : "";
          const cls = pct > 0 ? "up" : pct < 0 ? "dn" : "gray";
          tooltipEl.innerHTML = `
            <div class="gray">${d.time.slice(-5)}</div>
            <div>价格：<span class="${cls}">${d.price.toFixed(dec)}</span></div>
            <div>涨跌：<span class="${cls}">${sign}${chg.toFixed(dec)} (${sign}${pct.toFixed(2)}%)</span></div>
            <div class="gray">成交量：${fmtVol(ci === 0 ? d.volume : Math.max(0, d.volume - minuteData[ci - 1].volume))}</div>
          `;

          const wr = chartWrap.getBoundingClientRect();
          let tx = e.clientX - wr.left + 14;
          let ty = e.clientY - wr.top - 8;
          if (tx + 175 > wr.width) tx = e.clientX - wr.left - 185;
          if (ty + 110 > wr.height) ty = wr.height - 118;
          tooltipEl.style.left = tx + "px";
          tooltipEl.style.top = ty + "px";
          tooltipEl.style.display = "block";
        }

        function onLeave() {
          hideChEls();
          tooltipEl.style.display = "none";
        }
      }

      /* -------- 消息处理 -------- */
      window.addEventListener("message", (e) => {
        const msg = e.data;
        switch (msg.type) {
          case "init":
            stocks = msg.stocks;
            activeCode = msg.activeCode;
            Object.assign(quoteDataMap, msg.quoteData || {});
            for (const s of stocks) stocksMap[s.code] = s;
            activeInfo = stocksMap[activeCode] || null;
            activeQuote = quoteDataMap[activeCode] || null;
            renderTabs();
            renderHeader();
            break;
          case "loading":
            if (msg.code === activeCode) showLoading();
            break;
          case "minuteData":
            if (msg.code === activeCode) {
              minuteData = msg.data;
              activeInfo = msg.stockInfo || stocksMap[msg.code] || null;
              activeQuote = msg.quoteInfo || quoteDataMap[msg.code] || null;
              if (activeInfo) stocksMap[msg.code] = activeInfo;
              renderHeader();
              renderChart();
            }
            break;
        }
      });

      /* -------- 响应式ResizeObserver -------- */
      let rafId = null;
      const doRender = () => {
        if (rafId) return;
        rafId = requestAnimationFrame(() => {
          rafId = null;
          if (minuteData) renderChart();
        });
      };
      new ResizeObserver(doRender).observe(chartWrap);
      new ResizeObserver(doRender).observe(volWrap);
    </script>
  </body>
</html>
